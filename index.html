<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红人排期 · 跟进日历</title>
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --primary: #4A90E2;
            --bg: #F8FAFC;
            --text: #1E293B;
            --border: #E2E8F0;
            --p0: #EF4444;
            --p1: #F97316;
            --p2: #F59E0B;
            --p3: #10B981;
            --p4: #64748B;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1350px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #0F172A;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: #2563EB;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .btn-outline {
            background: #F1F5F9;
            color: #475569;
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background: #E2E8F0;
            box-shadow: none;
        }

        .calendar-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            background: white;
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            margin-bottom: 24px;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.04);
        }

        .calendar-table th {
            background: #F8FAFC;
            color: #475569;
            padding: 14px 6px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid var(--border);
        }

        .calendar-table td {
            height: 140px;
            border: 1px solid var(--border);
            padding: 6px 6px 4px 6px;
            vertical-align: top;
            transition: background 0.1s;
        }

        .day-number {
            font-weight: 600;
            font-size: 13px;
            color: #64748B;
            display: inline-block;
            width: 26px;
            height: 26px;
            text-align: center;
            line-height: 26px;
            border-radius: 50%;
            margin-bottom: 4px;
        }

        .current-day .day-number {
            background: var(--primary);
            color: white;
        }

        .event-list {
            list-style: none;
            padding: 0;
            margin: 4px 0 0 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 105px;
            overflow-y: auto;
        }

        .event-item {
            font-size: 11px;
            padding: 5px 8px 5px 6px;
            border-radius: 6px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            line-height: 1.3;
            cursor: default;
        }

        .event-content {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .event-content a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .event-content a:hover {
            text-decoration: underline;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 15px;
            padding: 0 2px;
            line-height: 1;
            transition: 0.15s;
        }
        .delete-btn:hover {
            color: white;
            transform: scale(1.2);
        }

        .priority-P0 { background: var(--p0); }
        .priority-P1 { background: var(--p1); }
        .priority-P2 { background: var(--p2); }
        .priority-P3 { background: var(--p3); }
        .priority-P4 { background: var(--p4); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(3px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 28px 30px;
            border-radius: 20px;
            width: 480px;
            max-width: 94%;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.3);
            animation: modalFade 0.2s ease;
        }

        @keyframes modalFade {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 22px;
            font-size: 20px;
            color: #0F172A;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: 2px solid var(--primary);
            outline-offset: 1px;
            border-color: transparent;
        }

        .project-input-group {
            display: flex;
            gap: 8px;
        }

        .project-input-group select {
            flex: 1;
        }

        .add-project-btn {
            background: #F1F5F9;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            padding: 0 16px;
            font-size: 20px;
            font-weight: 400;
            cursor: pointer;
            color: #334155;
            transition: 0.15s;
            display: flex;
            align-items: center;
        }

        .add-project-btn:hover {
            background: #E2E8F0;
            border-color: #94A3B8;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-secondary {
            background: #E2E8F0;
            color: #334155;
        }
        .btn-secondary:hover {
            background: #CBD5E1;
        }

        .empty-hint {
            color: #94A3B8;
            font-size: 12px;
            padding: 2px 4px;
        }

        @media (max-width: 700px) {
            .calendar-table td {
                height: 110px;
                padding: 4px;
            }
            .event-item {
                font-size: 10px;
                padding: 3px 4px;
            }
            .day-number {
                width: 22px;
                height: 22px;
                line-height: 22px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📅 红人排期 · 跟进日历</h1>
        <button class="btn" onclick="openModal()">＋ 新建排期</button>
    </header>

    <div class="calendar-controls">
        <button class="btn btn-outline" onclick="prevMonth()">‹</button>
        <h2 id="month-year-display" style="margin:0; min-width:140px; text-align:center; font-size:18px;"></h2>
        <button class="btn btn-outline" onclick="nextMonth()">›</button>
        <button class="btn btn-outline" onclick="goToCurrentMonth()">今天</button>
    </div>

    <table class="calendar-table">
        <thead><tr><th>周日</th><th>周一</th><th>周二</th><th>周三</th><th>周四</th><th>周五</th><th>周六</th></tr></thead>
        <tbody id="calendar-body"></tbody>
    </table>
</div>

<!-- 弹窗 -->
<div class="modal" id="task-modal">
    <div class="modal-content">
        <h3>✏️ 新建排期 / 待办</h3>

        <div class="form-group">
            <label>1. 项目选择</label>
            <div class="project-input-group">
                <select id="task-project"></select>
                <button type="button" class="add-project-btn" onclick="addNewProjectPrompt()" title="添加项目">＋</button>
            </div>
        </div>

        <div class="form-group">
            <label for="task-title">2. 红人名称 / 账号</label>
            <input type="text" id="task-title" placeholder="例: Alex_Reviewer" required>
        </div>

        <div class="form-group">
            <label for="task-link">红人链接 / 跟进链接 (选填)</label>
            <input type="url" id="task-link" placeholder="https://instagram.com/... 或表格链接">
        </div>

        <div class="form-group">
            <label for="task-ddl-type">3. DDL 类型</label>
            <select id="task-ddl-type">
                <option value="脚本提交">📄 脚本提交</option>
                <option value="视频初稿提交">🎥 视频初稿提交</option>
                <option value="视频二稿提交">🎬 视频二稿提交</option>
                <option value="发布">🚀 发布</option>
                <option value="付款">💰 付款</option>
                <option value="日常待办">✅ 日常待办</option>
            </select>
        </div>

        <div class="form-group">
            <label for="task-priority">4. 紧急程度</label>
            <select id="task-priority">
                <option value="P0">🔴 P0 - 极其紧急</option>
                <option value="P1">🟠 P1 - 重要高优</option>
                <option value="P2">🟡 P2 - 中优先级</option>
                <option value="P3">🟢 P3 - 低优先级</option>
                <option value="P4">🔵 P4 - 正常常规</option>
            </select>
        </div>

        <div class="form-group">
            <label for="task-date">5. DDL 日期</label>
            <input type="date" id="task-date" required>
        </div>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn" onclick="saveTask()">保存</button>
        </div>
    </div>
</div>

<script>
    // ----- 数据层（全局变量，方便调试） -----
    let projects = JSON.parse(localStorage.getItem('influencer_projects')) || ["Momcozy", "Bluetti"];
    
    let tasks = JSON.parse(localStorage.getItem('influencer_tasks_v3')) || [
        { id: 1, project: "Momcozy", title: "Alex_TikTok", ddlType: "脚本提交", priority: "P1", link: "https://www.google.com", date: new Date().toISOString().split('T')[0] },
        { id: 2, project: "Bluetti", title: "TechUnbox", ddlType: "发布", priority: "P0", link: "https://www.youtube.com", date: new Date().toISOString().split('T')[0] }
    ];

    let currentDate = new Date();

    // ----- 辅助函数 -----
    function saveProjects() {
        localStorage.setItem('influencer_projects', JSON.stringify(projects));
    }

    function saveTasks() {
        localStorage.setItem('influencer_tasks_v3', JSON.stringify(tasks));
    }

    // ----- 填充项目下拉（关键修复）-----
    function populateProjects() {
        const select = document.getElementById('task-project');
        if (!select) {
            console.error('找不到 task-project 元素');
            return;
        }
        // 清空
        select.innerHTML = '';
        // 添加选项
        projects.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });
        // 如果项目列表不为空，默认选中第一个
        if (projects.length > 0) {
            select.value = projects[0];
        }
        console.log('项目下拉已刷新，当前项目列表:', projects);
    }

    // ----- 渲染日历 -----
    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const monthDisplay = document.getElementById('month-year-display');
        monthDisplay.textContent = `${year}年 ${month + 1}月`;

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        const calendarBody = document.getElementById('calendar-body');
        calendarBody.innerHTML = '';

        let dateCounter = 1;
        for (let row = 0; row < 6; row++) {
            const tr = document.createElement('tr');
            let hasCell = false;

            for (let col = 0; col < 7; col++) {
                const td = document.createElement('td');

                if (row === 0 && col < firstDay) {
                    td.innerHTML = '';
                } else if (dateCounter > totalDays) {
                    td.innerHTML = '';
                } else {
                    hasCell = true;
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dateCounter).padStart(2,'0')}`;

                    const daySpan = document.createElement('span');
                    daySpan.className = 'day-number';
                    daySpan.textContent = dateCounter;
                    td.appendChild(daySpan);

                    if (year === today.getFullYear() && month === today.getMonth() && dateCounter === today.getDate()) {
                        td.classList.add('current-day');
                    }

                    const ul = document.createElement('ul');
                    ul.className = 'event-list';

                    const dayTasks = tasks.filter(t => t.date === dateStr);
                    if (dayTasks.length === 0) {
                        const emptyHint = document.createElement('div');
                        emptyHint.className = 'empty-hint';
                        emptyHint.textContent = '—';
                        ul.appendChild(emptyHint);
                    } else {
                        dayTasks.forEach(task => {
                            const li = document.createElement('li');
                            li.className = `event-item priority-${task.priority}`;

                            const content = document.createElement('div');
                            content.className = 'event-content';
                            const displayText = `[${task.project}] ${task.title} · ${task.ddlType}`;

                            if (task.link) {
                                const a = document.createElement('a');
                                a.href = task.link;
                                a.target = '_blank';
                                a.textContent = displayText;
                                a.title = `项目: ${task.project} | 紧急: ${task.priority}`;
                                content.appendChild(a);
                            } else {
                                const span = document.createElement('span');
                                span.textContent = displayText;
                                span.title = `项目: ${task.project} | 紧急: ${task.priority}`;
                                content.appendChild(span);
                            }

                            const delBtn = document.createElement('button');
                            delBtn.className = 'delete-btn';
                            delBtn.innerHTML = '✕';
                            delBtn.onclick = (e) => {
                                e.stopPropagation();
                                deleteTask(task.id);
                            };

                            li.appendChild(content);
                            li.appendChild(delBtn);
                            ul.appendChild(li);
                        });
                    }

                    td.appendChild(ul);
                    dateCounter++;
                }
                tr.appendChild(td);
            }
            if (hasCell) calendarBody.appendChild(tr);
        }
    }

    // ----- 增删改 -----
    function addNewProjectPrompt() {
        const name = prompt('请输入新项目名称 (例如: Clipto)');
        if (name && name.trim() !== '') {
            const trimmed = name.trim();
            if (!projects.includes(trimmed)) {
                projects.push(trimmed);
                saveProjects();
                populateProjects(); // 刷新下拉列表
                const select = document.getElementById('task-project');
                if (select) select.value = trimmed;
                alert('✅ 项目 "' + trimmed + '" 已添加！');
            } else {
                alert('⚠️ 该项目已存在');
            }
        }
    }

    function openModal() {
        // 先刷新项目列表
        populateProjects();
        // 默认日期今天
        const dateInput = document.getElementById('task-date');
        if (dateInput) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }
        document.getElementById('task-title').value = '';
        document.getElementById('task-link').value = '';
        document.getElementById('task-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('task-modal').style.display = 'none';
    }

    function saveTask() {
        const projectSelect = document.getElementById('task-project');
        const project = projectSelect ? projectSelect.value : '';
        const title = document.getElementById('task-title').value.trim();
        const link = document.getElementById('task-link').value.trim();
        const ddlType = document.getElementById('task-ddl-type').value;
        const priority = document.getElementById('task-priority').value;
        const date = document.getElementById('task-date').value;

        if (!project || !title || !date) {
            alert('请完整填写：项目、红人名称、日期');
            return;
        }

        const newTask = {
            id: Date.now(),
            project,
            title,
            link: link || '',
            ddlType,
            priority,
            date
        };

        tasks.push(newTask);
        saveTasks();
        closeModal();
        renderCalendar();
        alert('✅ 排期已保存！');
    }

    function deleteTask(id) {
        if (confirm('确定要删除这条排期吗？')) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderCalendar();
        }
    }

    // ----- 导航 -----
    function prevMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    }
    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    }
    function goToCurrentMonth() {
        currentDate = new Date();
        renderCalendar();
    }

    // ----- 暴露全局（用于 onclick） -----
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.saveTask = saveTask;
    window.addNewProjectPrompt = addNewProjectPrompt;
    window.deleteTask = deleteTask;
    window.prevMonth = prevMonth;
    window.nextMonth = nextMonth;
    window.goToCurrentMonth = goToCurrentMonth;

    // ----- 页面加载完成后初始化 -----
    window.addEventListener('DOMContentLoaded', function() {
        console.log('页面加载完成，开始初始化...');
        renderCalendar();
        populateProjects();
        console.log('初始化完成，当前项目:', projects);
    });

    // 点击 modal 背景关闭
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('task-modal');
        if (modal) {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
        }
    });
</script>
</body>
</html>
